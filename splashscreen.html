<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OROSAITOOLS Loading</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #09090b;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shell {
        width: 100vw;
        height: 100vh;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
      }

      .card {
        width: 100%;
        height: 100%;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #09090b;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        color: #fafafa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .logoBox {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 2px solid #3f3f46;
        border-top-color: #fafafa;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      p {
        margin: 10px 0 0;
        color: #a1a1aa;
        font-size: 14px;
      }

      .dots {
        margin-top: 28px;
        display: flex;
        gap: 6px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #71717a;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(0.9);
        }

        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <main class="shell">
      <section class="card">
        <div class="logoBox">
          <div class="spinner"></div>
        </div>

        <h1>OROSAITOOLS</h1>
        <p>Preparing workspace...</p>

        <div class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </section>
    </main>

    <script type="module">
      import { invoke } from "@tauri-apps/api/core";

      window.addEventListener("DOMContentLoaded", async () => {
        try {
          await invoke("splashscreen_ready");
        } catch (error) {
          console.error("Failed to notify Tauri that splashscreen is ready:", error);
        }
      });
    </script>
  </body>
</html>
